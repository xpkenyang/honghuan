name: Android 自动化测试
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: 验证JDK版本
        run: java -version && javac -version
          
      - name: 授予Gradle执行权限
        run: chmod +x gradlew
        
      - name: 构建APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Xmx4096m -Dorg.gradle.jvmargs=-Xmx4096m"
          
      - name: 上传构建好的APK
        uses: actions/upload-artifact@v4
        with:
          name: honghuang-guard-apk
          path: app/build/outputs/apk/debug/*.apk
          
      - name: 运行静态代码检查（可选）
        run: ./gradlew lintDebug --continue || echo "静态检查有警告，继续执行"
        
      # 模拟器测试暂时关闭，先保证构建成功
