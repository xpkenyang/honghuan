name: Android 自动化测试
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: 验证JDK版本
        run: java -version && javac -version
        
      - name: 配置国内镜像源，解决依赖下载问题
        run: |
          echo "=== 配置Gradle国内镜像 ==="
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/public/' }
                  maven { url 'https://maven.aliyun.com/repository/google/' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin/' }
                  maven { url 'https://maven.aliyun.com/repository/central/' }
                  maven { url 'https://mirrors.cloud.tencent.com/gradle/' }
                  maven { url 'https://artifact.bytedance.com/repository/Volcengine/' }
              }
          }
          EOF
          
          echo "=== 配置Gradle Wrapper国内镜像 ==="
          sed -i 's#https\://services.gradle.org/distributions#https\://mirrors.cloud.tencent.com/gradle#g' gradle/wrapper/gradle-wrapper.properties
          
      - name: 授予Gradle执行权限
        run: chmod +x gradlew
        
      - name: 打印Gradle配置
        run: |
          cat gradle/wrapper/gradle-wrapper.properties
          echo "=== Gradle版本 ==="
          ./gradlew --version
        
      - name: 构建APK（优化版）
        run: ./gradlew assembleDebug --build-cache --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx8192m -Dorg.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8"
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        
      - name: 收集构建日志
        if: always()
        run: |
          mkdir -p build-logs
          cp -r app/build/outputs/* build-logs/ 2>/dev/null || true
          cp -r ~/.gradle/daemon/*/daemon-*.log build-logs/ 2>/dev/null || true
      
      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs
          path: build-logs/
          
      - name: 上传构建好的APK
        uses: actions/upload-artifact@v4
        with:
          name: honghuang-guard-apk
          path: app/build/outputs/apk/debug/*.apk
          
      - name: 运行静态代码检查（可选）
        run: ./gradlew lintDebug --continue || echo "静态检查有警告，继续执行"
        
      # 模拟器测试暂时关闭，先保证构建成功
      # - name: 启动Android模拟器并运行测试
      #   uses: reactivecircus/android-emulator-runner@v2
