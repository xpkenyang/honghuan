name: Android 自动化测试
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: 验证JDK版本
        run: java -version && javac -version
        
      - name: 测试网络连接
        run: |
          echo "=== 网络测试 ==="
          ping -c 3 maven.aliyun.com || echo "阿里云Maven ping失败"
          ping -c 3 dl.google.com || echo "Google Maven ping失败"
          curl -I https://maven.aliyun.com/repository/public || echo "阿里云Maven访问失败"
          curl -I https://dl.google.com/dl/android/maven2/ || echo "Google Maven访问失败"
          
      - name: 授予Gradle执行权限
        run: chmod +x gradlew
        
      - name: 打印Gradle配置
        run: |
          cat gradle/wrapper/gradle-wrapper.properties
          echo "=== Gradle版本 ==="
          ./gradlew --version
        
      - name: 构建APK（带详细日志）
        run: ./gradlew assembleDebug --info --stacktrace --debug --no-build-cache
        env:
          GRADLE_OPTS: "-Xmx8192m -Dorg.gradle.jvmargs=-Xmx8192m -Dhttp.proxyHost= -Dhttps.proxyHost="
          ANDROID_HOME: /usr/local/lib/android/sdk
        continue-on-error: true
        
      - name: 收集构建日志
        if: always()
        run: |
          mkdir -p build-logs
          cp -r app/build/outputs/* build-logs/ 2>/dev/null || true
          cp -r ~/.gradle/daemon/*/daemon-*.log build-logs/ 2>/dev/null || true
      
      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs
          path: build-logs/
          
      - name: 上传构建好的APK
        uses: actions/upload-artifact@v4
        with:
          name: honghuang-guard-apk
          path: app/build/outputs/apk/debug/*.apk
          
      - name: 运行静态代码检查（可选）
        run: ./gradlew lintDebug --continue || echo "静态检查有警告，继续执行"
        
      # 模拟器测试暂时关闭，先保证构建成功
      # - name: 启动Android模拟器并运行测试
      #   uses: reactivecircus/android-emulator-runner@v2
